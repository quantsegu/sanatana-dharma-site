<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Cycle of life">
  <defs>
    <linearGradient id="cycleRing" x1="6" y1="6" x2="26" y2="26" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2d8f6a"/>
      <stop offset="0.5" stop-color="#6b48c9"/>
      <stop offset="1" stop-color="#3aa3d6"/>
    </linearGradient>
    <marker id="cycleArrow" markerWidth="5" markerHeight="5" refX="4.2" refY="2.5" orient="auto">
      <path d="M0 0 L5 2.5 L0 5 Z" fill="#5a3d9e"/>
    </marker>
  </defs>
  <!-- soft core: source / seed -->
  <circle cx="16" cy="16" r="4.5" fill="url(#cycleRing)" opacity="0.22"/>
  <!-- ~300° arc: continuous becoming; gap leaves room for the arrow head -->
  <!-- ~300° sweep: renewal / cycle (open wedge for arrowhead legibility) -->
  <path
    fill="none"
    stroke="url(#cycleRing)"
    stroke-width="2.6"
    stroke-linecap="round"
    marker-end="url(#cycleArrow)"
    d="M 16 6 A 10 10 0 1 1 7.34 11"
  />
</svg>
